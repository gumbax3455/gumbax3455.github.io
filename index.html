<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Latin Word List</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background-color: #f4f4f9; color: #333; }
        h1 { text-align: center; }
        .stats { text-align: center; color: #666; margin-bottom: 20px; font-style: italic; }
        
        /* Table Styling */
        table { width: 100%; max-width: 800px; margin: 0 auto; border-collapse: collapse; background: white; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        th, td { padding: 12px; border: 1px solid #ddd; text-align: left; }
        th { background-color: #007bff; color: white; position: sticky; top: 0; }
        tr:nth-child(even) { background-color: #f9f9f9; }
        tr:hover { background-color: #f1f1f1; }
        
        .latin-col { font-weight: bold; color: #2c3e50; width: 40%; }
    </style>
</head>
<body>

    <h1>Latin-German Vocabulary</h1>
    <div id="status" class="stats">Loading file...</div>

    <table id="wordTable">
        <thead>
            <tr>
                <th>Latin</th>
                <th>German</th>
            </tr>
        </thead>
        <tbody id="tableBody">
            </tbody>
    </table>

    <script>
        fetch('words.csv')
            .then(response => response.text())
            .then(data => {
                const status = document.getElementById('status');
                const tableBody = document.getElementById('tableBody');
                
                // 1. Clean data and split into rows
                // This regex handles standard newlines and carriage returns better
                const rows = data.replace(/^\uFEFF/, '').split(/\r\n|\n|\r/);
                
                let count = 0;

                // 2. Loop through rows (skip the first header row if it exists)
                rows.forEach((row, index) => {
                    if (row.trim() === "" || index === 0) return; 

                    const columns = row.split(';');
                    const latin = columns[0] ? columns[0].trim() : "";
                    const german = columns[1] ? columns[1].trim() : "";

                    if (latin || german) {
                        const tr = document.createElement('tr');
                        tr.innerHTML = `
                            <td class="latin-col">${latin}</td>
                            <td>${german}</td>
                        `;
                        tableBody.appendChild(tr);
                        count++;
                    }
                });

                status.innerText = `Successfully displayed ${count} words from your list.`;
            })
            .catch(err => {
                document.getElementById('status').innerText = "Error loading words.csv. Check filename and GitHub upload.";
                console.error(err);
            });
    </script>
</body>
</html>
