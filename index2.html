<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Latin Learning Hub</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding-top: 50px; }
        .search-container { text-align: center; }
        input { padding: 10px; width: 300px; font-size: 16px; border: 1px solid #ccc; border-radius: 5px; }
        #result { margin-top: 20px; font-size: 1.2rem; font-weight: bold; color: #333; }
        .sub-text { font-weight: normal; color: #666; font-size: 1rem; }
    </style>
</head>
<body>

    <div class="search-container">
        <h1>Latin Dictionary</h1>
        <input type="text" id="searchInput" placeholder="Type a Latin word..." oninput="search()">
        <div id="result"></div>
    </div>

    <script>
        let dictionary = [];

        // 1. Load the CSV file
        fetch('words.csv')
            .then(response => response.text())
            .then(data => {
                const rows = data.split('\n').slice(1); // Split by line and skip header
                dictionary = rows.map(row => {
                    const [latin, german] = row.split(','); // Change to ';' if your CSV uses semicolons
                    return { 
                        latin: latin?.trim().toLowerCase(), 
                        german: german?.trim() 
                    };
                }).filter(item => item.latin); // Remove empty rows
            });

        // 2. Search Function
        function search() {
            const query = document.getElementById('searchInput').value.toLowerCase().trim();
            const display = document.getElementById('result');
            
            if (query === "") {
                display.innerHTML = "";
                return;
            }

            const match = dictionary.find(item => item.latin === query);

            if (match) {
                display.innerHTML = `German: <span class="sub-text">${match.german}</span>`;
            } else {
                display.innerHTML = "<span class='sub-text'>Word not found</span>";
            }
        }
    </script>
</body>
</html>
